{% extends "base.html" %}
{% block title %}{% if show %}Edit Show{% else %}New Show{% endif %} - Monday Crew{% endblock %}
{% block content %}
<div class="section" style="max-width:600px;margin:0 auto;">
  <h1 class="section-title">{% if show %}Edit Show{% else %}New Show{% endif %}</h1>

  <form method="post" action="{% if show %}/pages/shows/{{ show.id }}/edit{% else %}/pages/shows/new{% endif %}">
    <div class="form-group">
      <label for="title">Title *</label>
      <input type="text" id="title" name="title" value="{{ show.title if show else '' }}" required>
    </div>
    <div class="form-group">
      <label for="venue">Venue *</label>
      <input type="text" id="venue" name="venue" value="{{ show.venue if show else '' }}" required>
    </div>
    <div class="form-group">
      <label for="address">Address</label>
      <input type="text" id="address" name="address" value="{{ show.address if show else '' }}" placeholder="Full address">
    </div>
    <div style="display:flex;gap:1rem;">
      <div class="form-group" style="flex:1;">
        <label for="show_date">Date *</label>
        <input type="date" id="show_date" name="show_date" value="{{ show.show_date.strftime('%Y-%m-%d') if show else '' }}" required>
      </div>
      <div class="form-group" style="flex:1;">
        <label for="show_time">Time</label>
        <input type="time" id="show_time" name="show_time" value="{{ show.show_time.strftime('%H:%M') if show and show.show_time else '' }}">
      </div>
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" rows="4" placeholder="Show description...">{{ show.description if show else '' }}</textarea>
    </div>
    <div class="form-group">
      <label for="ticket_price">Ticket Price</label>
      <input type="text" id="ticket_price" name="ticket_price" value="{{ show.ticket_price if show else '' }}" placeholder="e.g. 20,000원">
    </div>
    <div class="form-group">
      <label for="ticket_url">Ticket URL</label>
      <input type="url" id="ticket_url" name="ticket_url" value="{{ show.ticket_url if show else '' }}" placeholder="https://...">
    </div>
    <div class="form-group">
      <label for="poster_url">Poster Image URL</label>
      <input type="url" id="poster_url" name="poster_url" value="{{ show.poster_url if show else '' }}" placeholder="https://...">
    </div>
    {% if show %}
    <div class="form-group">
      <label for="status">Status</label>
      <select id="status" name="status">
        <option value="upcoming" {% if show.status == "upcoming" %}selected{% endif %}>Upcoming</option>
        <option value="completed" {% if show.status == "completed" %}selected{% endif %}>Completed</option>
        <option value="cancelled" {% if show.status == "cancelled" %}selected{% endif %}>Cancelled</option>
      </select>
    </div>
    {% endif %}
    <button type="submit" class="btn btn-accent" style="width:100%;">{% if show %}Update{% else %}Create{% endif %} Show</button>
  </form>
</div>
{% endblock %}
