{% extends "base.html" %}
{% block title %}{{ "Edit" if item else "New" }} Item{% endblock %}
{% block content %}
<div class="card" style="max-width: 500px;">
  <h1>{{ "Edit" if item else "New" }} Item</h1>
  <form method="post">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" value="{{ item.name if item else '' }}" required>
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" rows="3">{{ item.description if item and item.description else '' }}</textarea>
    </div>
    <div class="form-group">
      <label for="category_id">Category</label>
      <select id="category_id" name="category_id">
        <option value="">— None —</option>
        {% for cat in categories %}
          <option value="{{ cat.id }}" {{ 'selected' if item and item.category_id == cat.id else '' }}>{{ cat.name }}</option>
        {% endfor %}
      </select>
    </div>
    {% if item %}
    <div class="form-group">
      <label>
        <input type="checkbox" name="is_active" {{ 'checked' if item.is_active else '' }}>
        Active
      </label>
    </div>
    {% endif %}
    <button type="submit" class="btn btn-primary">{{ "Update" if item else "Create" }}</button>
    <a href="/pages/items" class="btn" style="margin-left: 0.5rem;">Cancel</a>
  </form>
</div>
{% endblock %}
